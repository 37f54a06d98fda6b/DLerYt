name: 🔴Download videos(s) on-demand & Save to repo
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Operation mode'
        required: true
        type: choice
        options:
          - 'download'
          - 'list-formats'
          - 'custom-format'
        default: 'download'      
      
      video_url:
        description: 'Video URLs (space-separated for multiple)'
        required: true
        type: string

      custom_format:
        description: 'Custom format string (only used when mode=custom-format)'
        required: false
        type: string
        default: 'best'

      stream_type:
        description: 'Stream type'
        required: false
        default: 'video+audio'
        type: choice
        options:
          - 'video+audio'
          - 'video-only'
          - 'audio-only'
      
      video_codec:
        description: 'Video codec'
        required: false
        default: 'any'
        type: choice
        options:
          - 'any'
          - 'av01 (AV1)'
          - 'avc1 (H.264)'
          - 'vp9 (VP9)'
      
      video_quality:
        description: 'Video quality'
        required: false
        default: '1080p'
        type: choice
        options:
          - '2160p (4K)'
          - '1440p'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
      
      audio_codec:
        description: 'Audio codec'
        required: false
        default: 'opus'
        type: choice
        options:
          - 'opus'
          - 'mp4a (AAC)'
          - 'vorbis'
      
      audio_bitrate:
        description: 'Max audio bitrate (kbps)'
        required: false
        default: '128'
        type: choice
        options:
          - '64'
          - '96'
          - '128'
          - '192'
          - '256'
          - '320'
      
      subtitles:
        description: 'Download subtitles'
        required: false
        default: false
        type: boolean
      
      subtitle_langs:
        description: 'Subtitle languages (comma-separated, e.g. en,ja)'
        required: false
        default: 'en.*'
        type: string
      
      output_template:
        description: 'Output filename template'
        required: false
        # default: '%(title)s - %(upload_date)s@%(uploader)s [%(id)s].%(ext)s'
        default: '%(title)s@%(uploader)s [%(id)s].%(ext)s'
        type: string
      
      download_sections:
        # description: 'Download specific sections (e.g., "*10:15-inf" for 10:15 onwards, "*00:10-00:20" for 10-20 seconds, "intro,outro" for chapters)'
        description: 'Download specific parts (e.g., "*10:15-inf" for 10:15 onwards, "intro,*10:15-inf" for named chapter + time range). Space-separated for multiple sections.'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup yt-dlp using setup-yt-dlp
        uses: AnimMouse/setup-yt-dlp@main
        with:
          nightly: true

      - name: Setup yt-dlp YouTube cookies using setup-yt-dlp/cookies
        uses: AnimMouse/setup-yt-dlp/cookies@main
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}
      
      - name: Test yt-dlp by checking version
        run: yt-dlp --version     

      - name: List available formats
        if: inputs.mode == 'list-formats'
        run: |
          echo "📋 Listing available formats for each URL..."
          for URL in ${{ inputs.video_url }}; do
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔗 URL: $URL"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            yt-dlp --list-formats "$URL"
          done
          
          echo ""
          echo "✅ Format listing complete. Workflow will now terminate."
          exit 0
      
      
      - name: Build format string
        if: inputs.mode != 'list-formats'
        id: format
        run: |
          if [ "${{ inputs.mode }}" = "custom-format" ]; then
              FORMAT="${{ inputs.custom_format }}"
              echo "🎯 Using custom format: $FORMAT"
          else
            STREAM_TYPE="${{ inputs.stream_type }}"
            
            # Extract codec values (remove descriptions)
            VIDEO_CODEC="${{ inputs.video_codec }}"
            VIDEO_CODEC="${VIDEO_CODEC%% *}"
            
            AUDIO_CODEC="${{ inputs.audio_codec }}"
            AUDIO_CODEC="${AUDIO_CODEC%% *}"
            
            # Extract height from quality
            HEIGHT="${{ inputs.video_quality }}"
            HEIGHT="${HEIGHT%%p*}"
            
            # Extract numeric bitrate
            BITRATE="${{ inputs.audio_bitrate }}"
            BITRATE="${BITRATE%% *}"
  
            # Build format string based on stream type
            if [ "$STREAM_TYPE" = "audio-only" ]; then
              # Audio only
              FORMAT="bestaudio[acodec^=${AUDIO_CODEC}][abr<=${BITRATE}]/bestaudio[acodec^=${AUDIO_CODEC}]/bestaudio/best"
            elif [ "$STREAM_TYPE" = "video-only" ]; then
              # Video only (no audio)
              if [ "$VIDEO_CODEC" = "any" ]; then
                FORMAT="bestvideo[height<=${HEIGHT}]/best[height<=${HEIGHT}]"
              else
                FORMAT="bestvideo[vcodec^=${VIDEO_CODEC}][height<=${HEIGHT}]/bestvideo[height<=${HEIGHT}]"
              fi
            else
              # Video + Audio (default)
              if [ "$VIDEO_CODEC" = "any" ]; then
                FORMAT="bestvideo[height<=${HEIGHT}]+bestaudio[acodec^=${AUDIO_CODEC}][abr<=${BITRATE}]/bestvideo[height<=${HEIGHT}]+bestaudio[acodec^=${AUDIO_CODEC}]/bestvideo[height<=${HEIGHT}]+bestaudio/best[height<=${HEIGHT}]"
              else
                FORMAT="bestvideo[vcodec^=${VIDEO_CODEC}][height<=${HEIGHT}]+bestaudio[acodec^=${AUDIO_CODEC}][abr<=${BITRATE}]/bestvideo[vcodec^=${VIDEO_CODEC}][height<=${HEIGHT}]+bestaudio[acodec^=${AUDIO_CODEC}]/bestvideo[vcodec^=${VIDEO_CODEC}][height<=${HEIGHT}]+bestaudio/best[height<=${HEIGHT}]"
              fi
            fi
          fi
          
          echo "format=$FORMAT" >> $GITHUB_OUTPUT
          echo "📋 Final format string: $FORMAT"
      
      - name: Download video(s)
        if: inputs.mode != 'list-formats'
        run: |
          # Subtitle options
          SUBTITLE_OPTS=""
          if [ "${{ inputs.subtitles }}" = "true" ]; then
            SUBTITLE_OPTS="--write-subs --write-auto-subs --sub-langs ${{ inputs.subtitle_langs }} --embed-subs --compat-options no-keep-subs"
          fi
          
          echo "📋 Subtitle options: $SUBTITLE_OPTS"
          echo "🔤 Subtitle langs input: ${{ inputs.subtitle_langs }}"
          echo "✅ Subtitles enabled: ${{ inputs.subtitles }}"
    

          mkdir -p downloads tmp_downloads
          
          for URL in ${{ inputs.video_url }}; do
            echo "⬇️ Downloading $URL"
            
            yt-dlp \
              -f "${{ steps.format.outputs.format }}" \
              --output "tmp_downloads/${{ inputs.output_template }}" \
              $SUBTITLE_OPTS \
              "$URL"
          done
          
      
      
      - name: Cut and combine video sections
        if: inputs.download_sections != '' && inputs.mode != 'list-formats'
        run: |
          (
            set -x  # Enable command tracing
            shopt -s nullglob
            
            echo "=== Starting section cutting ==="
            echo "Download sections input: '${{ inputs.download_sections }}'"
            
            cd tmp_downloads
            echo "Changed to tmp_downloads directory"
            echo "Available video files:"
            ls -lh *.mp4 *.mkv *.webm 2>/dev/null || echo "No video files found"
            
            VIDEO_COUNT=0
            for video in *.mp4 *.mkv *.webm; do
              [ -f "$video" ] || continue
              VIDEO_COUNT=$((VIDEO_COUNT + 1))
              
              echo ""
              echo "=== Processing video #$VIDEO_COUNT: '$video' ==="
              
              if ! DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$video" 2>&1); then
                echo "ERROR: Failed to get duration for '$video'"
                echo "ffprobe output: $DURATION"
                continue
              fi
              echo "Duration: $DURATION seconds"
              
              BASENAME="${video%.*}"
              EXT="${video##*.}"
              echo "Basename: '$BASENAME', Extension: '$EXT'"
              
              SECTIONS="${{ inputs.download_sections }}"
              PART_NUM=0
              CONCAT_LIST="${BASENAME}_concat_list.txt"
              > "$CONCAT_LIST"
              echo "Created concat list: '$CONCAT_LIST'"
              
              for section in $SECTIONS; do
                echo ""
                echo "--- Processing section: '$section' ---"
                section="${section#\*}"
                echo "After removing *: '$section'"
                
                if [[ "$section" =~ ^(-?[0-9:.]+)-(-?[0-9:.]+|inf)$ ]]; then
                  START="${BASH_REMATCH[1]}"
                  END="${BASH_REMATCH[2]}"
                  echo "Parsed START='$START', END='$END'"
                  
                  if [[ "$START" =~ ^- ]]; then
                    START=$(awk "BEGIN {print $DURATION - ${START#-}}")
                    echo "Calculated negative start: $START"
                  fi
                  
                  if [[ "$END" == "inf" ]]; then
                    END="$DURATION"
                    echo "Using duration as end: $END"
                  elif [[ "$END" =~ ^- ]]; then
                    END=$(awk "BEGIN {print $DURATION - ${END#-}}")
                    echo "Calculated negative end: $END"
                  fi
                  
                  PART_FILE="${BASENAME}_part_${PART_NUM}.${EXT}"
                  echo "Cutting to: '$PART_FILE'"
                  echo "Command: ffmpeg -i \"$video\" -ss $START -to $END -c copy -y \"$PART_FILE\""
                  
                  if ffmpeg -i "$video" -ss "$START" -to "$END" -c copy -y "$PART_FILE" 2>&1 | tail -20; then
                    echo "file '$PART_FILE'" >> "$CONCAT_LIST"
                    PART_NUM=$((PART_NUM + 1))
                    echo "Success! Part $PART_NUM created"
                  else
                    echo "ERROR: ffmpeg failed for section $section"
                  fi
                else
                  echo "WARNING: Section '$section' doesn't match expected format"
                fi
              done
              
              echo ""
              echo "=== Combining phase ==="
              echo "Total parts created: $PART_NUM"
              
              if [ $PART_NUM -gt 0 ]; then
                echo "Concat list contents:"
                cat "$CONCAT_LIST"
                
                TEMP_OUTPUT="${BASENAME}_combined_temp.${EXT}"
                echo "Combining into: '$TEMP_OUTPUT'"
                
                if ffmpeg -f concat -safe 0 -i "$CONCAT_LIST" -c copy -y "$TEMP_OUTPUT" 2>&1 | tail -20; then
                  echo "Replacing original '$video' with combined file"
                  mv "$TEMP_OUTPUT" "$video"
                  
                  echo "Cleaning up temporary files"
                  rm -f "${BASENAME}_part_"*.${EXT} "$CONCAT_LIST"
                  echo "✓ Successfully processed: '$video'"
                else
                  echo "ERROR: Failed to combine sections"
                fi
              else
                echo "WARNING: No parts were created for '$video'"
              fi
            done
            
            echo ""
            echo "=== Final summary ==="
            echo "Total videos processed: $VIDEO_COUNT"
            echo "Remaining files:"
            ls -lh *.mp4 *.mkv *.webm 2>/dev/null || echo "No video files"
          )


      
      - name: Package video(s)
        if: inputs.mode != 'list-formats'
        run: |
          # Split any file over 90MB using zip native split (unzip compatible)
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
              # zip -s creates: file.zip, file.z01, file.z02, ...
              zip -0 -s 90m "downloads/${BASENAME}.zip" -j "$FILE"
              echo "✅ Parts: $(ls downloads/${BASENAME}* | wc -l)"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done
          
          rm -rf tmp_downloads 


      - name: Commit & Push in batches of 5 files
        if: inputs.mode != 'list-formats'
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mapfile -t ALL_FILES < <(find downloads/ -type f)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"

            for FILE in "${BATCH[@]}"; do
              git add "$FILE"
            done
            
            git commit -m "Add downloaded files — batch $BATCH_NUM [skip ci]"

            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "✅ Batch $BATCH_NUM pushed"
          done

          echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es)"

